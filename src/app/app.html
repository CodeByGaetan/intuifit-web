<header class="nav">

    <a class="logo" routerLink="/"><img class="logo-mark" src="logo.svg" alt="" />Intui<span class="fit">Fit</span></a>
    <nav class="nav-links">
      <a routerLink="/support" routerLinkActive="active" i18n="@@nav.support">Support</a>
      <a routerLink="/privacy" routerLinkActive="active" i18n="@@nav.privacy">Privacy</a>
      <span class="lang-switch">
        <a [href]="langHref('en')" (click)="setLang('en')" [class.active]="currentLang === 'en'" hreflang="en">EN</a>

    </nav>
  </div>
</header>

    <nav>
      <a routerLink="/privacy" i18n="@@nav.privacy">Privacy</a>

    </nav>
  </div>
</footer>
